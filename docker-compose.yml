services:
  # ---- PostgreSQL ----
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-log_search_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-log_search_pass}
      POSTGRES_DB: ${POSTGRES_DB:-log_search_platform_db}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ---- Backend（NestJS） ----
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-log_search_user}:${POSTGRES_PASSWORD:-log_search_pass}@postgres:5432/${POSTGRES_DB:-log_search_platform_db}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key}
    depends_on:
      - postgres

  # ---- Frontend（React） ----
  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data: